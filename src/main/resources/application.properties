# ============================================================
# Application
# ============================================================
spring.application.name=email-service
server.port=8085

# ============================================================
# RabbitMQ Connection
# ============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# ============================================================
# RabbitMQ Shared Exchange
# All queues bind to this single exchange.
# ============================================================
rabbitmq.exchange.email=email.exchange

# ============================================================
# To add a new producer: append a new [N] block below.
# ============================================================

# HRMS Application
rabbitmq.queues[0].name=email.hrms.queue
rabbitmq.queues[0].routing-key=email.hrms.routing.key
rabbitmq.queues[0].dead-letter-queue-name=email.hrms.dead-letter.queue

# ============================================================
# RabbitMQ Listener Retry
# Spring Boot auto-configures retry when these are set.
# 3 attempts: 2s -> 4s -> 8s backoff, then routes to DLQ.
# ============================================================
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-retries=6
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000ms
spring.rabbitmq.listener.simple.default-requeue-rejected=false
 
# ============================================================
# PostgreSQL Datasource (for email audit log)
# Replace credentials to match your local/production database.
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/email_service_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Redis Cache
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.data.redis.repositories.enabled=false

# ============================================================
# Management API Security
# ============================================================
email.service.api-key=your-secret-api-key-here

# ============================================================
# Logging
# ============================================================
logging.level.org.hibernate.orm.connections.pooling=WARN
